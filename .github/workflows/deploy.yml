name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e

            PROJECT_DIR="/data/stable/aggre-api"
            LOG_FILE="$HOME/aggre-deploy.log"
            LOCK_FILE="/tmp/aggre-deploy.lock"

            # 防止并发部署
            if [ -f "$LOCK_FILE" ]; then
              echo "$(date '+%Y-%m-%d %H:%M:%S') [SKIP] Deploy already in progress" | tee -a "$LOG_FILE"
              exit 0
            fi
            trap 'rm -f "$LOCK_FILE"' EXIT
            touch "$LOCK_FILE"

            echo "========================================" >> "$LOG_FILE"
            echo "$(date '+%Y-%m-%d %H:%M:%S') [START] Deploy triggered by GitHub Actions" | tee -a "$LOG_FILE"

            cd "$PROJECT_DIR"

            # 拉取最新代码
            echo "$(date '+%Y-%m-%d %H:%M:%S') [INFO] git pull..." | tee -a "$LOG_FILE"
            git pull origin main 2>&1 | tee -a "$LOG_FILE"

            # 重新构建并启动
            echo "$(date '+%Y-%m-%d %H:%M:%S') [INFO] docker compose build..." | tee -a "$LOG_FILE"
            docker compose build 2>&1 | tee -a "$LOG_FILE"

            echo "$(date '+%Y-%m-%d %H:%M:%S') [INFO] docker compose up..." | tee -a "$LOG_FILE"
            docker compose up -d 2>&1 | tee -a "$LOG_FILE"

            # 清理旧镜像
            docker image prune -f >> "$LOG_FILE" 2>&1

            echo "$(date '+%Y-%m-%d %H:%M:%S') [DONE] Deploy completed" | tee -a "$LOG_FILE"
            echo "========================================" >> "$LOG_FILE"
